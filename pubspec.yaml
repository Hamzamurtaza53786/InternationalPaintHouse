name: paint
description: "A new Flutter project for International Paint House."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  url_launcher: ^6.2.5
  google_maps_flutter: ^2.6.1 
  image_picker: ^1.0.7 
  file_picker: ^11.0.2
  flutter_colorpicker: ^1.1.0
  path_provider: ^2.1.4
  open_file: ^3.5.10
  google_generative_ai: ^0.4.7
  blurrycontainer: ^1.0.2  # For the Glassmorphism effect
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  go_router: ^17.2.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brands/
    - assets/categories/
    - assets/banners/ 
    - assets/products/ekotint/
    - assets/products/ekotint/premium/
    - assets/products/ekotint/budget/
    - assets/products/gobis/gobisgold/
    - assets/products/gobis/gobisprime/
    - assets/products/nelson/nelsonextra/
    - assets/products/nelson/nelsonbold/
    - assets/products/nelson/nelsontrend/
    - assets/products/nelson/nelsonexclusive/
    - assets/products/reliance/
    - assets/products/reliable/
    - assets/products/kosarlac/
    - assets/products/diamond/ace/
    - assets/products/diamond/overall/
    - assets/products/diamond/everlast/
    - assets/products/ici/
    - assets/products/nippon/
    - assets/products/finaltouch/
    - assets/products/epoxy/
    - assets/products/industrial/
    - assets/products/spray/
    - assets/products/paintaccessories/
    - assets/products/waterheatproof/
    - assets/products/artstextures/